<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SIDAMIU DEPOT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#021126;
color:white;
display:flex;
}

.sidebar{
width:220px;
height:100vh;
background:#042247;
padding:15px;
position:fixed;
left:0;
top:0;
}

.sidebar h2{
text-align:center;
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#00cfff;
font-weight:bold;
cursor:pointer;
}

.main{
margin-left:240px;
padding:20px;
width:100%;
}

.page{
display:none;
}

.page.active{
display:block;
}

.card{
background:#042247;
padding:20px;
border-radius:12px;
border:1px solid #00cfff;
margin-bottom:15px;
}

.grid2{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.stat-card{
background:#06305f;
padding:20px;
border-radius:12px;
text-align:center;
border:1px solid #00cfff;
}

.stat-card h1{
font-size:40px;
}

table{
width:100%;
border-collapse:collapse;
}

table th,
table td{
border:1px solid #00cfff;
padding:10px;
}

.media-card{
background:#06305f;
padding:15px;
border-radius:10px;
border:1px solid #00cfff;
margin-bottom:10px;
}

.media-card a{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#00cfff;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

@media(max-width:768px){

.sidebar{
width:100%;
height:auto;
position:relative;
}

.main{
margin-left:0;
}

.grid2{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="sidebar">

<h2>DEPOT</h2>

<button onclick="showPage('profil')">
🏢 Profil Depot
</button>

<button onclick="showPage('histori')">
📋 Histori
</button>

<button onclick="showPage('kie')">
📚 Media KIE
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<div class="main">


    <!-- PROFIL -->

<div id="profil" class="page active">

<div class="card">

<h2>Dashboard Depot</h2>

</div>

<div class="grid2">

<div class="stat-card">

<h1 id="skorDepot">0</h1>

<p>Skor Terakhir</p>

</div>

<div class="stat-card">

<h1 id="statusDepot">-</h1>

<p>Status Depot</p>

</div>

</div>

<div class="card">

<h3>Profil Depot</h3>

<br>

<p>
<b>Nama Depot :</b>
<span id="namaDepot"></span>
</p>

<br>

<p>
<b>Alamat :</b>
<span id="alamatDepot"></span>
</p>

</div>

</div>

<!-- HISTORI -->

<div id="histori" class="page">

<div class="card">

<h2>Histori Pemeriksaan</h2>

<table>

<thead>

<tr>

<th>Skor</th>
<th>Status</th>
<th>Tanggal</th>

</tr>

</thead>

<tbody id="historiDepot">

</tbody>

</table>

</div>

</div>

<!-- MEDIA KIE -->

<div id="kie" class="page">

<div class="card">

<h2>📚 Media KIE</h2>

<div id="mediaKIEList">

Loading...

</div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase-config.js";

import {
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.showPage=function(page){

document
.querySelectorAll(".page")
.forEach(x=>x.classList.remove("active"));

document
.getElementById(page)
.classList.add("active");

}

window.logout = async()=>{

await signOut(auth);

localStorage.clear();

window.location.href =
"index.html";

}

let emailLogin = "";

async function loadProfil(){

const snapshot =
await getDocs(
collection(db,"depots")
);

snapshot.forEach(docu=>{

const d = docu.data();

if(d.email === emailLogin){

document.getElementById("namaDepot").innerHTML =
d.nama || "-";

document.getElementById("alamatDepot").innerHTML =
d.alamat || "-";

document.getElementById("statusDepot").innerHTML =
d.status || "-";

document.getElementById("skorDepot").innerHTML =
d.skor || 0;

}

});

}

async function loadHistori(){

const tbody =
document.getElementById("historiDepot");

tbody.innerHTML = "";

const depotSnapshot =
await getDocs(
collection(db,"depots")
);

let depotSaya = null;

depotSnapshot.forEach(docu=>{

const d = docu.data();

if(d.email === emailLogin){

depotSaya = docu.id;

}

});

if(!depotSaya) return;

const inspeksiSnapshot =
await getDocs(
collection(db,"inspections")
);

inspeksiSnapshot.forEach(docu=>{

const d = docu.data();

if(d.depotId === depotSaya){

tbody.innerHTML += `
<tr>
<td>${d.skorAkhir || 0}</td>
<td>${d.status || "-"}</td>
<td>${d.tanggalPenilaian || "-"}</td>
</tr>
`;

}

});

}

async function loadMediaKIE(){

const box =
document.getElementById("mediaKIEList");

if(!box) return;

box.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"media_kie")
);

if(snapshot.empty){

box.innerHTML =
"<p>Belum ada Media KIE.</p>";

return;

}

snapshot.forEach(docu=>{

const d = docu.data();

box.innerHTML += `

<div class="media-card">

<h3>${d.nama || "-"}</h3>

<p>${d.jenis || "-"}</p>

<a
href="${d.link || "#"}"
target="_blank">

Buka Media

</a>

</div>

`;

});

}

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.href =
"index.html";

return;

}

emailLogin = user.email;

await loadProfil();
await loadHistori();
await loadMediaKIE();

});

</script>

</body>
</html>
