<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SIDAMIU LOGIN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#021126,
#042247,
#06305f
);
overflow:hidden;
position:relative;
}

.bg-animation{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.bg-animation::before,
.bg-animation::after{
content:"";
position:absolute;
width:500px;
height:500px;
border-radius:50%;
background:rgba(0,207,255,.15);
filter:blur(100px);
animation:float 10s infinite alternate;
}

.bg-animation::before{
top:-150px;
left:-150px;
}

.bg-animation::after{
bottom:-150px;
right:-150px;
animation-delay:2s;
}

@keyframes float{

0%{
transform:translateY(0);
}

100%{
transform:translateY(80px);
}

}

.login-box{
width:420px;
max-width:92%;
padding:35px;
border-radius:25px;
background:rgba(4,34,71,.75);
backdrop-filter:blur(15px);
border:1px solid rgba(0,207,255,.5);
box-shadow:
0 0 30px rgba(0,207,255,.3);
color:white;
position:relative;
z-index:2;
}

.logo{
font-size:60px;
text-align:center;
margin-bottom:10px;
animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:25px;
font-size:14px;
}

.input-group{
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
outline:none;
font-size:15px;
}

input:focus{
box-shadow:0 0 10px #00cfff;
}

button{
width:100%;
padding:14px;
background:#00cfff;
border:none;
border-radius:10px;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 15px #00cfff;
}

#hasil{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
opacity:.7;
}

@media(max-width:768px){

.login-box{
padding:25px;
}

.logo{
font-size:45px;
}

h1{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="bg-animation"></div>

<div class="login-box">

<div class="logo">
💧
</div>

<h1>SIDAMIU</h1>

<div class="subtitle">
Sistem Informasi Depot Air Minum Isi Ulang
</div>

<div class="input-group">

<input
type="email"
id="email"
placeholder="📧 Email">

</div>

<div class="input-group">

<input
type="password"
id="password"
placeholder="🔒 Password">

</div>

<button id="loginBtn">

MASUK KE SISTEM

</button>

<div id="hasil"></div>

<div class="footer">

© SIDAMIU 2025

</div>

</div>

<script type="module">

import { auth, db } from "./firebase-config.js";

import {
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document
.getElementById("loginBtn")
.onclick = async()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

document.getElementById("hasil").innerHTML =
"⏳ Sedang login...";

await signInWithEmailAndPassword(
auth,
email,
password
);

const userDoc =
await getDoc(
doc(db,"user",email)
);

if(!userDoc.exists()){

document.getElementById("hasil").innerHTML =
"❌ Role user tidak ditemukan";

return;

}

const role =
userDoc.data().role;

if(role === "admin"){

window.location.href =
"admin.html";

}
else if(role === "depot"){

window.location.href =
"depot.html";

}
else{

document.getElementById("hasil").innerHTML =
"❌ Role tidak valid";

}

}
catch(err){

document.getElementById("hasil").innerHTML =
"❌ Login gagal";

console.log(err);

}

};

</script>

</body>
</html>
