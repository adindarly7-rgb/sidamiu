<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SIDAMIU LOGIN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
rgba(2,17,38,.35),
rgba(2,17,38,.55)
),
url("bg.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

overflow:hidden;
position:relative;
}


.login-box{

width:420px;

padding:35px;

border-radius:30px;

background:
rgba(2,17,38,.55);

backdrop-filter:blur(15px);

border:1px solid rgba(0,207,255,.4);

box-shadow:
0 0 40px rgba(0,207,255,.35);

color:white;

position:relative;
z-index:2;

}

.logo{

font-size:80px;

text-align:center;

margin-bottom:15px;

filter:
drop-shadow(
0 0 20px #00cfff
);

animation:
floatLogo 3s ease-in-out infinite;

}

@keyframes floatLogo{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}

h1{

text-align:center;

margin-bottom:10px;

color:white;

text-shadow:
0 0 20px rgba(0,207,255,.5);

}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:25px;
font-size:14px;
}

.input-group{
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
outline:none;
font-size:15px;
}

input:focus{
box-shadow:0 0 10px #00cfff;
}

button{
width:100%;
padding:14px;
background:#00cfff;
border:none;
border-radius:10px;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 15px #00cfff;
}

#hasil{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
opacity:.7;
}

.loading-screen{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#021126;

display:none;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:99999;

color:white;

}

.loading-logo{

font-size:100px;

margin-bottom:20px;

animation:
spinLogo 2s linear infinite;

filter:
drop-shadow(
0 0 20px #00cfff
);

}

@keyframes spinLogo{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

@media(max-width:768px){

.login-box{
animation:
fadeUp .8s ease;
padding:25px;
}

.logo{
font-size:45px;
}

h1{
font-size:24px;
}

}

</style>

</head>

<body>

<div id="loadingScreen" class="loading-screen">

<div class="loading-logo">

💧

</div>

<h2>SIDAMIU</h2>

<p id="loadingText">

Memuat Sistem 0%

</p>

</div>

<div class="bg-animation"></div>

<div class="login-box">

<div class="logo">
💧
</div>

<h1>SIDAMIU</h1>

<div class="subtitle">
Sistem Informasi Depot Air Minum Isi Ulang
</div>

<div class="input-group">

<input
type="email"
id="email"
placeholder="📧 Email">

</div>

<div class="input-group">

<input
type="password"
id="password"
placeholder="🔒 Password">

</div>

<button id="loginBtn">

MASUK KE SISTEM

</button>

<div id="hasil"></div>

<div class="footer">

© SIDAMIU 2025

</div>

</div>

<script type="module">

import { auth, db } from "./firebase-config.js";

import {
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document
.getElementById("loginBtn")
.onclick = async()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

document.getElementById("hasil").innerHTML =
"⏳ Sedang login...";

await signInWithEmailAndPassword(
auth,
email,
password
);

const userDoc =
await getDoc(
doc(db,"user",email)
);

if(!userDoc.exists()){

document.getElementById("hasil").innerHTML =
"❌ Role user tidak ditemukan";

return;

}

const role =
userDoc.data().role;

if(role === "admin"){

document
.getElementById("loadingScreen")
.style.display =
"flex";
let persen = 0;

const timer =
setInterval(()=>{

persen += 10;

document
.getElementById("loadingText")
.innerHTML =
`Memuat Sistem ${persen}%`;

if(persen >= 100){

clearInterval(timer);

}

},200);


setTimeout(()=>{

window.location.href =
"admin.html";

},2000);

}
else if(role === "depot"){

document
.getElementById("loadingScreen")
.style.display =
"flex";

setTimeout(()=>{

window.location.href =
"depot.html";

},2000);

}
else{

document.getElementById("hasil").innerHTML =
"❌ Role tidak valid";

}

}
catch(err){

document.getElementById("hasil").innerHTML =
"❌ Login gagal";

console.log(err);

}

};

</script>

</body>
</html>
